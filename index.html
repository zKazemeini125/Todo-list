<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <style>
    :root {
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
        font-size: 20px;
      }
      li {
        list-style: none;
        min-height: 98px;
      }
      button {
        text-transform: capitalize;
      }
      button:disabled {
        background-color: lightgray;
        text-transform: capitalize;
        color: gray;
        border: none;
      }
      textarea {
        resize: vertical;
      }
      select,
      option {
        font-size: 0.9rem;
      }
      .container {
        width: 80%;
        margin: 40px auto;
      }
      .flex-col {
        display: flex;
        flex-direction: column;
      }
      .flex-row {
        display: flex;
        flex-direction: row;
      }
      .d-flex {
        display: flex;
      }
      .w-80 {
        width: 80%;
      }
      .w-20 {
        width: 20%;
      }
      .m-1 {
        margin: 5px;
      }
      .my-2 {
        margin-top: 10px;
        margin-bottom: 10px;
      }
      .mx-1 {
        margin-left: 5px;
        margin-right: 5px;
      }
      .justify-end {
        justify-content: flex-end;
      }
      .justify-center {
        justify-content: center;
        align-items: center;
      }
      .align-end {
        align-items: flex-end;
      }
      .p-1 {
        padding: 5px;
      }
      .p-2 {
        padding: 10px;
      }
      .bg-green {
        background-color: rgb(10, 165, 10);
      }
      .bg-cancel {
        background-color: crimson;
      }
      .border {
        outline: none;
        border: solid 1px;
        border-radius: 10px;
      }
      .border-green {
        border-color: green;
      }
      .border-cancel {
        border-color: crimson;
      }
      .border-lightgray {
        border-color: lightgray !important;
      }
      .br-b {
        border-bottom: 1px solid black;
      }
      .text-white {
        color: white;
      }
      .titleList {
        width: 80%;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .bodyList {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
      .btnHolder > button {
        min-width: 150px;
      }
      .actionContainer > button {
        min-width: 50px;
      }
      .sortContainer {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-left: 10px;
      }
      .closeModal {
        float: right;
        cursor: pointer;
        width: 30px;
        height: 30px;
      }

      #inputTitle,
      #inputBody {
        font-size: 0.9rem;
        border: 1px lightgray solid;
        border-radius: 10px;
        padding: 0.3rem;
      }
      #searchContainer {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        width: max-content;
        border: 1px solid lightgray;
        border-radius: 10px;
        padding: 0.4rem;
        outline: 1px;
      }
      #searchContainer:focus-within {
        outline: auto;
      }
      #searchInput {
        font-size: 0.9rem;
        border: none;
        outline: none;
      }
      #clear {
        font-size: 0.9rem;
        border: none;
        outline: none;
        cursor: pointer;
      }
      #taskList {
        list-style: none;
        padding: 0;
      }
      #modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        overflow: auto;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        background-color: rgb(0, 0, 0, 0.6);
      }
      #modalContent {
        width: 60%;
        height: 40%;
        margin: 0 auto;
        margin-top: 4rem;
        border-radius: 1rem;
        background-color: white;
        padding: 1rem;
      }
      #modalTitle {
        font-family: "Courier New", Courier, monospace;
      }
      #modalSpan {
        color: brown;
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <div class="container flex-col">
        <form>
          <div class="flex-col">
            <div class="flex-col my-2">
              <label for="inputTitle">Task Title:</label>
              <input type="text" name="inputTitle" id="inputTitle" />
            </div>
            <div class="flex-col my-2">
              <label for="inputBody">Task Body:</label>
              <textarea name="inputBody" id="inputBody" rows="5"></textarea>
            </div>
            <div class="flex-row justify-end btnHolder">
              <button
                type="button"
                class="w-10 p-2 m-1 bg-green border border-green text-white"
                id="addButton"
                onclick="addTask()"
                disabled
              >
                add task
              </button>
              <button
                type="button"
                class="w-10 p-2 m-1 bg-cancel border border-cancel text-white"
                id="cancelEdit"
                onclick="cancelEditTask()"
                style="display: none"
              >
                cancel edit
              </button>
            </div>
          </div>
          <div class="flex-row">
            <div id="searchContainer" class="my-2">
              <span>🔎</span>
              <input
                type="search"
                id="searchInput"
                placeholder="Search here..."
              />
              <span
                id="clear"
                onclick="clearSearchInput()"
                style="visibility: hidden"
                >X</span
              >
            </div>
            <div class="sortContainer">
              <label class="mx-1" for="sortTasks">Sort by:</label>
              <select name="sortTasks" id="sort" class="p-1">
                <option value="none" selected>none</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
                <option value="az">Title a-z</option>
                <option value="za">Title z-a</option>
              </select>
            </div>
          </div>
          <div class="flex-col" id="taskContainer">
            <h4 id="emptyMsg" style="text-align: center">
              Task list is empty!
            </h4>
            <ul id="taskList"></ul>
          </div>
        </form>
      </div>
    </div>
    <div id="modal">
      <div id="modalContent">
        <span class="closeModal" onclick="colseModal()">X</span>
        <h5 id="modalTitle"></h5>
        <p id="modalBody"></p>
        <div class="d-flex justify-end" id="modalButtonHolder"></div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
