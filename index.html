<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <style>
      :root {
        font-family: "pro14-regular", "pro14-600", "pro14-700";
        font-size: 20px;
      }
      li {
        list-style: none;
        min-height: 98px;
      }
      button {
        text-transform: capitalize;
      }
      button:disabled {
        background-color: lightgray;
        text-transform: capitalize;
        color: gray;
        border: none;
      }
      textarea {
        resize: vertical;
      }
      select,
      option {
        font-size: 0.9rem;
      }
      .container {
        width: 80%;
        margin: 40px auto;
      }
      .flex-col {
        display: flex;
        flex-direction: column;
      }
      .flex-row {
        display: flex;
        flex-direction: row;
      }
      .d-flex {
        display: flex;
      }
      .w-80 {
        width: 80%;
      }
      .w-20 {
        width: 20%;
      }
      .m-1 {
        margin: 5px;
      }
      .my-2 {
        margin-top: 10px;
        margin-bottom: 10px;
      }
      .mx-1 {
        margin-left: 5px;
        margin-right: 5px;
      }
      .justify-end {
        justify-content: flex-end;
      }
      .justify-center {
        justify-content: center;
        align-items: center;
      }
      .justify-space-between {
        justify-content: space-between;
      }
      .align-items-center {
        align-items: center;
      }
      .align-end {
        align-items: flex-end;
      }
      .p-1 {
        padding: 5px;
      }
      .p-2 {
        padding: 10px;
      }
      .pb-1 {
        padding-bottom: 1rem;
      }
      .bg-green {
        background-color: rgb(10, 165, 10);
      }
      .bg-cancel {
        background-color: crimson;
      }
      .border {
        outline: none;
        border: solid 1px;
        border-radius: 10px;
      }
      .border-green {
        border-color: green;
      }
      .border-cancel {
        border-color: crimson;
      }
      .border-lightgray {
        border-color: lightgray !important;
      }
      .border-bottom {
        border-bottom: 1px solid black;
      }
      .text-white {
        color: white;
      }
      .titleList {
        width: 80%;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .bodyList {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
      .btnHolder > button {
        min-width: 150px;
      }
      .actionContainer > button {
        min-width: 50px;
      }
      .sortContainer {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-left: 10px;
      }
      .closeModal {
        cursor: pointer;
        font-family:
          "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
      }

      #inputTitle,
      #inputBody {
        font-size: 0.9rem;
        border: 1px lightgray solid;
        border-radius: 10px;
        padding: 0.3rem;
      }
      #searchContainer {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        width: max-content;
        border: 1px solid lightgray;
        border-radius: 10px;
        padding: 0.4rem;
        outline: 1px;
      }
      #searchContainer:focus-within {
        outline: auto;
      }
      #searchInput {
        font-size: 0.9rem;
        border: none;
        outline: none;
      }
      #clearSearch {
        font-size: 0.9rem;
        border: none;
        outline: none;
        cursor: pointer;
        font-family:
          "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
      }

      #taskList {
        list-style: none;
        padding: 0;
      }

      #modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        overflow: auto;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        background-color: rgb(0, 0, 0, 0.6);
      }

      #modalContent {
        width: 60%;
        height: max-content;
        margin: 0 auto;
        margin-top: 4rem;
        border-radius: 1rem;
        background-color: white;
        padding: 1rem;
        position: relative;
      }

      #modalTitle {
        font-family: "Courier New", Courier, monospace;
        margin: 0;
      }

      #modalSpan {
        color: brown;
      }

      #modalButtonHolder {
        position: absolute;
        bottom: 1rem;
        right: 1rem;
      }

      #toast {
        background-color: rgb(55, 55, 55);
        width: max-content;
        z-index: 1;
        border-radius: 0.5rem;
        color: aliceblue;
        font-size: 0.9rem;
        padding-left: 0.5rem;
        padding-right: 0.5rem;
        position: fixed;
        right: 0;
        bottom: 5px;
        visibility: hidden;
      }

      #toast > span {
        align-self: flex-start;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
        margin: 10px;
      }
      #toast > p {
        padding-right: 10px;
        margin: 1rem;
      }
      #toast.show {
        visibility: visible;
        animation:
          fadeIn 0.5s,
          fadeOut 0.3s 2.5s;
      }
      #toast.error {
        background-color: coral;
        color: white;
      }
      #toast.addSuccessful,
      #toast.updateSuccessful,
      #toast.deleteSuccessful {
        background-color: forestgreen;
        color: white;
      }

      @font-face {
        font-family: "pro14-regular";
        src: "fonts/source-code-pro-v14-latin-regular.woff2";
      }
      @font-face {
        font-family: "pro14-600";
        src: "fonts/source-sans-pro-v14-latin-600.woff2";
      }
      @font-face {
        font-family: "pro14-700";
        src: "fonts/source-sans-pro-v14-latin-700.woff2";
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          right: -300px;
        }
        to {
          opacity: 1;
          right: 0;
        }
      }

      @keyframes fadeOut {
        from {
          opacity: 1;
          right: 0;
        }
        to {
          opacity: 0;
          right: -300px;
        }
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <div class="container flex-col">
        <form>
          <div class="flex-col">
            <div class="flex-col my-2">
              <label for="inputTitle">Task Title:</label>
              <input type="text" name="inputTitle" id="inputTitle" />
            </div>
            <div class="flex-col my-2">
              <label for="inputBody">Task Body:</label>
              <textarea name="inputBody" id="inputBody" rows="5"></textarea>
            </div>
            <div class="flex-row justify-end btnHolder">
              <button
                type="button"
                class="w-10 p-2 m-1 bg-green border border-green text-white"
                id="storeTasks"
                onclick="storeTask()"
                disabled
              >
                add task
              </button>
              <button
                type="button"
                class="w-10 p-2 m-1 bg-cancel border border-cancel text-white"
                id="cancelEdit"
                onclick="cancelEditTask()"
                style="display: none"
              >
                cancel edit
              </button>
            </div>
          </div>
          <div class="flex-row">
            <div id="searchContainer" class="my-2">
              <span>🔎</span>
              <input
                type="search"
                id="searchInput"
                placeholder="Search here..."
              />
              <span
                id="clearSearch"
                onclick="clearinputSearch()"
                style="visibility: hidden"
                >X</span
              >
            </div>
            <div class="sortContainer">
              <label class="mx-1" for="sortTasks">Sort by:</label>
              <select name="sortTasks" id="selectSort" class="p-1">
                <option value="none" selected>none</option>
                <option value="az">Title a-z</option>
                <option value="za">Title z-a</option>
              </select>
            </div>
          </div>
          <div class="flex-col" id="taskContainer">
            <h4 id="emptyMsg" style="text-align: center">
              Task list is empty!
            </h4>
            <ul id="taskList"></ul>
          </div>
        </form>
      </div>
    </div>
    <div id="modal">
      <div id="modalContent">
        <div
          class="d-flex flex-row justify-space-between align-items-center border-bottom border-lightgray pb-1 m-1"
        >
          <h5 id="modalTitle"></h5>
          <div class="closeModal" onclick="colseModal()">X</div>
        </div>
        <div id="modalBody"></div>
        <div class="d-flex justify-end" id="modalButtonHolder"></div>
      </div>
    </div>
    <div
      class="d-flex flex-row justify-space-between align-items-center"
      id="toast"
    >
      <p id="toastText"></p>
      <span id="closeToast" class="m-1" onclick="closeToast()">X</span>
    </div>
    <script src="index.js"></script>
  </body>
</html>
